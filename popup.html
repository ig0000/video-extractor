<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 350px; padding: 15px; font-family: system-ui, sans-serif; }
    button { 
      width: 100%; padding: 10px; margin-bottom: 15px; 
      background: #0078D7; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #005A9E; }
    #result { 
      white-space: pre-wrap; font-size: 13px; background: #2d2d2d; color: #ccc;
      padding: 12px; border-radius: 6px; display: none; word-break: break-all;
      font-family: 'Courier New', Courier, monospace;
    }
  </style>
</head>
<body>
  <button id="extractBtn">提取并复制 Markdown</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
